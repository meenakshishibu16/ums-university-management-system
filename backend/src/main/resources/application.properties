# ============================================================
# UMS Backend - Quarkus Configuration
# ============================================================

# Application
quarkus.application.name=ums-backend

# --- Database ---
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=ums_user
quarkus.datasource.password=ums_password
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/ums_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

# --- JWT ---
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://ums.university.edu
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=28800

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# --- HTTP ---
quarkus.http.port=8080

# --- OpenAPI ---
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.console.enable=true
